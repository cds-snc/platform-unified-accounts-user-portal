name: Workflow failure

on:
  workflow_run:
    workflows:
      - "Docker build and push Staging"
      - "Docker deploy Staging"
      - "Docker SBOM Staging"
    types:
      - completed

permissions:
  contents: none

jobs:
  on-failure:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    env:
      WORKFLOW_NAME: '${{ github.event.workflow_run.name }}'
      WORKFLOW_URL: '${{ github.event.workflow_run.html_url }}'
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@f0796e7f3d6bec5d40aecb0321ed8012f5602f84 # v1.0.2
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
          DNS_PROXY_LOGANALYTICSSHAREDKEY: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}

      - name: Notify Slack
        run: |
          json='{"blocks":[{"type":"section","text":{"type":"mrkdwn","text":":red: User portal workflow failed: <${{ github.event.workflow_run.html_url }}|${{ github.event.workflow_run.name }}>"}}]}'
          curl -X POST -H 'Content-type: application/json' --data "$json" ${{ secrets.STAGING_CLOUDWATCH_ALERT_SLACK_WEBHOOK }}